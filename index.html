<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2563eb"><link rel="manifest" href="manifest.webmanifest">
<title>ГАК Тренажёр</title><style>
:root{--bg:#f4f7fb;--card:#fff;--text:#14213d;--muted:#64748b;--primary:#2563eb;--ok:#16a34a;--bad:#dc2626;--line:#e2e8f0}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
body.dark{--bg:#0f172a;--card:#172033;--text:#f8fafc;--muted:#a7b3c6;--line:#334155}.app{max-width:760px;margin:auto;min-height:100vh;padding:calc(16px + env(safe-area-inset-top)) 14px calc(28px + env(safe-area-inset-bottom))}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{font-weight:800;font-size:24px}.subtitle{color:var(--muted);font-size:13px;margin-top:3px}
button,select,input{font:inherit}.iconbtn{border:0;background:var(--card);color:var(--text);border-radius:14px;padding:11px 13px;box-shadow:0 5px 18px #00000012}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 25px #0000000c}.menu{cursor:pointer;text-align:left;min-height:126px}.menu b{display:block;font-size:18px;margin:10px 0 5px}.menu span{color:var(--muted);font-size:13px}.emoji{font-size:28px}
.subjects{display:grid;gap:10px}.subject{display:flex;justify-content:space-between;align-items:center;padding:15px;border:1px solid var(--line);border-radius:15px;background:var(--card);cursor:pointer}.subject small{color:var(--muted)}.hidden{display:none!important}
.toprow{display:flex;gap:10px;align-items:center;margin-bottom:12px}.back{border:0;background:none;color:var(--primary);font-weight:700;padding:8px 0}.progress{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:10px 0 18px}.progress i{display:block;height:100%;background:var(--primary);width:0}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px}.question{font-weight:750;font-size:20px;line-height:1.35;margin:12px 0 18px}.options{display:grid;gap:10px}.option{width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--text);padding:14px;border-radius:14px;line-height:1.35}.option.correct{border-color:var(--ok);background:#16a34a18}.option.wrong{border-color:var(--bad);background:#dc262618}.option:disabled{opacity:1}
.actions{display:flex;gap:10px;margin-top:16px}.primary{flex:1;border:0;border-radius:14px;padding:14px;background:var(--primary);color:#fff;font-weight:750}.secondary{border:1px solid var(--line);border-radius:14px;padding:14px;background:var(--card);color:var(--text)}
.result{text-align:center}.score{font-size:58px;font-weight:900;color:var(--primary);margin:12px}.statrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}.stat{background:var(--bg);padding:12px;border-radius:13px}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted)}
label{display:block;font-weight:650;margin:12px 0 7px}.field{width:100%;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:13px;padding:13px}.notice{color:var(--muted);font-size:13px;line-height:1.45;margin-top:14px}.search{margin-bottom:10px}.listq{padding:13px;border-bottom:1px solid var(--line)}.listq b{font-size:13px;color:var(--primary)}.listq p{margin:5px 0;font-size:14px}
@media(max-width:480px){.grid{grid-template-columns:1fr}.menu{min-height:102px}.question{font-size:18px}}
</style></head><body><div class="app">
<header><div><div class="brand">🩺 ГАК Тренажёр</div><div class="subtitle" id="totalLabel"></div></div><button class="iconbtn" id="themeBtn">🌙</button></header>
<section id="home"><div class="grid">
<button class="card menu" onclick="openSetup('learn')"><span class="emoji">📚</span><b>Обучение</b><span>Ответ сразу проверяется</span></button>
<button class="card menu" onclick="openSetup('exam')"><span class="emoji">📝</span><b>Экзамен</b><span>Результат после завершения</span></button>
<button class="card menu" onclick="startMistakes()"><span class="emoji">❌</span><b>Мои ошибки</b><span id="mistakeCount">0 вопросов</span></button>
<button class="card menu" onclick="showFavorites()"><span class="emoji">⭐</span><b>Избранное</b><span id="favoriteCount">0 вопросов</span></button>
</div><div class="card" style="margin-top:12px"><b>Предметы</b><div class="subjects" id="subjectSummary" style="margin-top:10px"></div></div></section>
<section id="setup" class="hidden"><button class="back" onclick="show('home')">← Назад</button><div class="card"><h2 id="setupTitle">Настройка</h2>
<label>Предмет</label><select class="field" id="subjectSelect"></select><label>Количество вопросов</label><select class="field" id="countSelect"><option>20</option><option>40</option><option selected>80</option><option>100</option><option value="all">Все</option></select>
<label><input type="checkbox" id="shuffleOptions" checked> Перемешивать варианты ответов</label><button class="primary" style="width:100%;margin-top:14px" onclick="beginSession()">Начать</button></div></section>
<section id="quiz" class="hidden"><div class="toprow"><button class="back" onclick="confirmExit()">← В меню</button><div style="margin-left:auto;color:var(--muted)" id="timer"></div></div><div class="meta"><span id="qSubject"></span><span id="qNumber"></span></div><div class="progress"><i id="bar"></i></div>
<div class="card"><div class="question" id="questionText"></div><div class="options" id="options"></div><div class="actions"><button class="secondary" id="favBtn" onclick="toggleFavorite()">☆</button><button class="primary hidden" id="nextBtn" onclick="nextQuestion()">Далее</button></div></div></section>
<section id="result" class="hidden"><button class="back" onclick="show('home')">← В меню</button><div class="card result"><div class="emoji">🏁</div><h2>Результат</h2><div class="score" id="score"></div><div class="statrow"><div class="stat"><b id="correctStat"></b><span>правильно</span></div><div class="stat"><b id="wrongStat"></b><span>ошибок</span></div><div class="stat"><b id="timeStat"></b><span>время</span></div></div><button class="primary" style="width:100%" onclick="repeatWrong()">Повторить ошибки этой попытки</button></div></section>
<section id="favorites" class="hidden"><button class="back" onclick="show('home')">← Назад</button><div class="card"><h2 id="listTitle">Избранное</h2><input class="field search" id="searchBox" placeholder="Поиск по вопросу…" oninput="renderList()"><div id="questionList"></div></div></section>
</div><script>window.QUESTION_BANK=[{"id":1,"subject":"Внутренние болезни","question":"Аускультативный феномен в стадии прилива при крупозной пневмонии.","options":["влажные хрипы","сухие хрипы","крепитация indux","крепитация redux"],"correct":2},{"id":2,"subject":"Внутренние болезни","question":"Аускультативный феномен в стадии разгара (опеченения) крупозной пневмонии.","options":["ослабленное везикулярное дыхание","бронхиальное дыхание","влажные хрипы","сухие хрипы"],"correct":1},{"id":3,"subject":"Внутренние болезни","question":"Аускультативный феномен в стадии разрешения крупозной пневмонии.","options":["ослабленное везикулярное дыхание","влажные жарангсиз хрипы","крепитация redux","сухие хрипы"],"correct":2},{"id":4,"subject":"Внутренние болезни","question":"Эндогенный фактор, приводящий к развитию хронического бронхита.","options":["курение","Загрязнение воздуха.","инфекция","снижение иммунитета"],"correct":3},{"id":5,"subject":"Внутренние болезни","question":"Инфекционный эндокардит: суточная доза пенициллина:","options":["2 000 000- 4 000 000 ЕД","1 000 000-2 000 000 ЕД","20 000 000-50 000 000 ЕД","4 000 000-8 000 000 ЕД","все перечисленное"],"correct":0},{"id":6,"subject":"Внутренние болезни","question":"Укажите лабораторные показатели, характерные для инфекционного эндокардита:","options":["положительная гемокультура, СОЭ 50 мм/ч","гамма-глобулины 18%, СОЭ 15 мм/ч","Hb 130 г/л, отрицательная гемокультура","фибриноген 2,5 г/л, гамма-глобулины 16%","Hb 80 г/л, моноциты 20%"],"correct":0},{"id":7,"subject":"Внутренние болезни","question":"Причины относительной митральной недостаточности:","options":["все перечисленное","дилатация полости левого желудочка","пролапс митрального клапана","дисфункция папиллярных мышц","разрыв хорд"],"correct":0},{"id":8,"subject":"Внутренние болезни","question":"Что НЕ относится к этиологическим факторам митральной недостаточности:","options":["СВД","ревматическая лихорадка","СКВ","Атеросклероз","Инфекцион эндокардит"],"correct":0},{"id":9,"subject":"Внутренние болезни","question":"Прямой признак митральной недостаточности:","options":["систолический шум на верхушке, ослабление I тона","гипертрофия левого желудочка","гипертрофия левого предсердия","акцент II тона на лёгочной артерии","дилатация левого желудочка"],"correct":0},{"id":10,"subject":"Внутренние болезни","question":"Лучшие условия выслушивания систолического шума при митральной недостаточности:","options":["все перечисленное верно","положение на левом боку","область верхушки сердца","на выдохе с задержкой дыхания","после физической нагрузки"],"correct":0},{"id":11,"subject":"Внутренние болезни","question":"Патогенез митрального стеноза:","options":["все ответы верны","площадь митрального отверстия 1 см²","давление в левом предсердии 25 мм рт. ст.","активный спазм лёгочных артериол","гипертрофия правого желудочка"],"correct":0},{"id":12,"subject":"Внутренние болезни","question":"Прямые признаки митрального стеноза:","options":["усиление I тона, диастолический шум на верхушке","ослабление I тона, систолический шум на верхушке","акцент II тона над аортой и диастолический шум","шум Грэхема-Стилла, акцент II тона над лёгочной артерией","«сердечный горб», расширение правой границы сердца"],"correct":0},{"id":13,"subject":"Внутренние болезни","question":"Фонокардиографические признаки митрального стеноза:","options":["все ответы верны","интервал T–QS 0,12 с","Q-Iтон интервали 0,12сек.","интервал Q–I тон 0,12 с","усиление I тона"],"correct":0},{"id":14,"subject":"Внутренние болезни","question":"Осложнения митрального стеноза:","options":["кровохарканье, мерцательная аритмия","отёки ног, одышка","гепатомегалия, асцит","энцефалопатия, судороги","сердцебиение, кашель"],"correct":0},{"id":15,"subject":"Внутренние болезни","question":"Прямой признак аортального стеноза:","options":["все ответы верны","систолический шум во II межреберье справа","ослабление II тона","иррадиация шума на сосуды шеи","систолический шум в точке Боткина"],"correct": stion":"Основной способ профилактики рецидива кровотечения из варикозных вен пищевода:","options":["Прием аспирина","Лигирование вен или склеротерапия","Диета","Массаж"],"correct":1},{"id":1193,"subject":"Хирургические болезни","question":"При клапанном пневмотораксе давление в плевральной полости:","options":["Отрицательное","Положительное и постоянно растет","Равно атмосферному","Равно нулю"],"correct":1},{"id":1194,"subject":"Хирургические болезни","question":"Для эвакуации жидкости из плевральной полости пункцию чаще всего делают в:","options":["2-м межреберье","7-м или 8-м межреберье по задней подмышечной линии","Над ключицей","Через грудину"],"correct":1},{"id":1195,"subject":"Хирургические болезни","question":"Симптом «шуршания снега» под кожей при травме груди — это:","options":["Перелом ребра","Подкожная эмфизема","Плеврит","Пневмония"],"correct":1},{"id":1196,"subject":"Хирургические болезни","question":"Какое осложнение наиболее опасно при двустороннем окончатом (флотирующем) переломе ребер?","options":["Кашель","Парадоксальное дыхание и острая дыхательная недостаточность","Желтуха","Икота"],"correct":1},{"id":1197,"subject":"Хирургические болезни","question":"Проба Рувилуа-Грегуара используется для определения:","options":["Группы крови","Продолжающегося внутриплеврального кровотечения","Объема воздуха","Наличия гноя"],"correct":1}];</script><script>
const Q=window.QUESTION_BANK||[],subjects=[...new Set(Q.map(x=>x.subject))];const ids=['totalLabel','themeBtn','mistakeCount','favoriteCount','subjectSummary','subjectSelect','setupTitle','countSelect','shuffleOptions','timer','qSubject','qNumber','bar','questionText','options','favBtn','nextBtn','score','correctStat','wrongStat','timeStat','listTitle','searchBox','questionList'];const E={};ids.forEach(id=>E[id]=document.getElementById(id));const {totalLabel,themeBtn,mistakeCount,favoriteCount,subjectSummary,subjectSelect,setupTitle,countSelect,shuffleOptions,timer,qSubject,qNumber,bar,questionText,options,favBtn,nextBtn,score,correctStat,wrongStat,timeStat,listTitle,searchBox,questionList}=E;let mode='learn',session=[],pos=0,answers=[],displayOptions=[],startedAt=0,timerId=null,currentList=[];
const state={mistakes:new Set(JSON.parse(localStorage.getItem('gak_mistakes')||'[]')),favorites:new Set(JSON.parse(localStorage.getItem('gak_favorites')||'[]')),dark:localStorage.getItem('gak_dark')==='1'};
if(state.dark)document.body.classList.add('dark');const byId=id=>Q.find(q=>q.id===id);
function save(){localStorage.setItem('gak_mistakes',JSON.stringify([...state.mistakes]));localStorage.setItem('gak_favorites',JSON.stringify([...state.favorites]));updateCounts()}
function show(id){['home','setup','quiz','result','favorites'].forEach(x=>document.getElementById(x).classList.toggle('hidden',x!==id));if(id==='home')updateCounts()}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function plural(n){return n%10===1&&n%100!==11?'вопрос':(n%10>=2&&n%10<=4&&(n%100<10||n%100>=20)?'вопроса':'вопросов')}
function updateCounts(){mistakeCount.textContent=`${state.mistakes.size} ${plural(state.mistakes.size)}`;favoriteCount.textContent=`${state.favorites.size} ${plural(state.favorites.size)}`}
totalLabel.textContent=`${Q.length} вопросов · ${subjects.length} предмета`;subjectSummary.innerHTML=subjects.map(s=>{const n=Q.filter(q=>q.subject===s).length;return `<div class="subject" onclick="openSetup('learn','${s}')"><span>${s}</span><small>${n}</small></div>`}).join('');
subjectSelect.innerHTML=`<option value="all">Все предметы</option>`+subjects.map(s=>`<option>${s}</option>`).join('');
function openSetup(m,s='all'){mode=m;setupTitle.textContent=m==='learn'?'Режим обучения':'Режим экзамена';subjectSelect.value=s;show('setup')}
function beginSession(){let pool=subjectSelect.value==='all'?Q:Q.filter(q=>q.subject===subjectSelect.value);pool=shuffle(pool);const c=countSelect.value;session=c==='all'?pool:pool.slice(0,Math.min(+c,pool.length));start(session)}
function start(arr){if(!arr.length){alert('Здесь пока нет вопросов.');return}session=arr;pos=0;answers=[];startedAt=Date.now();show('quiz');clearInterval(timerId);timerId=setInterval(updateTimer,1000);renderQuestion();updateTimer()}
function updateTimer(){const sec=Math.floor((Date.now()-startedAt)/1000);timer.textContent=`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`}
function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function renderQuestion(){const q=session[pos];qSubject.textContent=q.subject;qNumber.textContent=`${pos+1} / ${session.length}`;bar.style.width=`${pos/session.length*100}%`;questionText.textContent=q.question;nextBtn.classList.add('hidden');favBtn.textContent=state.favorites.has(q.id)?'★':'☆';displayOptions=q.options.map((text,idx)=>({text,idx}));if(shuffleOptions.checked)displayOptions=shuffle(displayOptions);options.innerHTML=displayOptions.map((o,i)=>`<button class="option" onclick="choose(${i})">${String.fromCharCode(65+i)}. ${esc(o.text)}</button>`).join('')}
function choose(i){const q=session[pos],selected=displayOptions[i].idx,correct=selected===q.correct;answers[pos]={id:q.id,correct,selected};if(!correct)state.mistakes.add(q.id);else state.mistakes.delete(q.id);save();const btns=[...options.children];btns.forEach((b,k)=>{b.disabled=true;const original=displayOptions[k].idx;if(original===q.correct)b.classList.add('correct');if(k===i&&!correct)b.classList.add('wrong')});nextBtn.classList.remove('hidden')}
function nextQuestion(){if(!answers[pos])return;if(pos<session.length-1){pos++;renderQuestion()}else finish()}
function finish(){clearInterval(timerId);bar.style.width='100%';const good=answers.filter(a=>a&&a.correct).length,bad=session.length-good,sec=Math.floor((Date.now()-startedAt)/1000);score.textContent=`${Math.round(good/session.length*100)}%`;correctStat.textContent=good;wrongStat.textContent=bad;timeStat.textContent=`${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;show('result')}
function toggleFavorite(){const id=session[pos].id;if(state.favorites.has(id))state.favorites.delete(id);else state.favorites.add(id);save();favBtn.textContent=state.favorites.has(id)?'★':'☆'}
function startMistakes(){mode='learn';start(shuffle([...state.mistakes].map(byId).filter(Boolean)))}
function repeatWrong(){mode='learn';start(answers.filter(a=>a&&!a.correct).map(a=>byId(a.id)).filter(Boolean))}
function showFavorites(){currentList=[...state.favorites].map(byId).filter(Boolean);listTitle.textContent='Избранное';show('favorites');renderList()}
function renderList(){const s=(searchBox.value||'').toLowerCase(),a=currentList.filter(q=>q.question.toLowerCase().includes(s));questionList.innerHTML=a.length?a.map(q=>`<div class="listq"><b>${q.subject}</b><p>${esc(q.question)}</p><button class="secondary" onclick="mode='learn';start([byId(${q.id})])">Открыть</button></div>`).join(''):'<p class="notice">Ничего не найдено.</p>'}
function confirmExit(){if(confirm('Завершить текущую попытку?')){clearInterval(timerId);show('home')}}
themeBtn.onclick=()=>{document.body.classList.toggle('dark');state.dark=document.body.classList.contains('dark');localStorage.setItem('gak_dark',state.dark?'1':'0');themeBtn.textContent=state.dark?'☀️':'🌙'};themeBtn.textContent=state.dark?'☀️':'🌙';updateCounts();if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script></body></html>
