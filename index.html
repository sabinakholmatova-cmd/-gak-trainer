<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<title>ГАК Тренажёр</title>
<meta name="gak-version" content="mixed-blocks-v2-1199"><style>
:root{--bg:#f4f7fb;--card:#fff;--text:#14213d;--muted:#64748b;--primary:#2563eb;--ok:#16a34a;--bad:#dc2626;--line:#e2e8f0}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
body.dark{--bg:#0f172a;--card:#172033;--text:#f8fafc;--muted:#a7b3c6;--line:#334155}.app{max-width:760px;margin:auto;min-height:100vh;padding:calc(16px + env(safe-area-inset-top)) 14px calc(28px + env(safe-area-inset-bottom))}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{font-weight:800;font-size:24px}.subtitle{color:var(--muted);font-size:13px;margin-top:3px}
button,select,input{font:inherit}.iconbtn{border:0;background:var(--card);color:var(--text);border-radius:14px;padding:11px 13px;box-shadow:0 5px 18px #00000012}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 25px #0000000c}.menu{cursor:pointer;text-align:left;min-height:126px}.menu b{display:block;font-size:18px;margin:10px 0 5px}.menu span{color:var(--muted);font-size:13px}.emoji{font-size:28px}
.subjects{display:grid;gap:10px}.subject{display:flex;justify-content:space-between;align-items:center;padding:15px;border:1px solid var(--line);border-radius:15px;background:var(--card);cursor:pointer}.subject small{color:var(--muted)}.hidden{display:none!important}
.toprow{display:flex;gap:10px;align-items:center;margin-bottom:12px}.back{border:0;background:none;color:var(--primary);font-weight:700;padding:8px 0}.progress{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:10px 0 18px}.progress i{display:block;height:100%;background:var(--primary);width:0}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px}.question{font-weight:750;font-size:20px;line-height:1.42;margin:12px 0 18px;white-space:pre-wrap;overflow:visible;max-height:none;overflow-wrap:anywhere}.options{display:grid;gap:10px}.option{width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--text);padding:14px;border-radius:14px;line-height:1.42;white-space:normal;overflow:visible;max-height:none;overflow-wrap:anywhere}.option.correct{border-color:var(--ok);background:#16a34a18}.option.wrong{border-color:var(--bad);background:#dc262618}.option:disabled{opacity:1}
.actions{display:flex;gap:10px;margin-top:16px}.primary{flex:1;border:0;border-radius:14px;padding:14px;background:var(--primary);color:#fff;font-weight:750}.secondary{border:1px solid var(--line);border-radius:14px;padding:14px;background:var(--card);color:var(--text)}
.result{text-align:center}.score{font-size:58px;font-weight:900;color:var(--primary);margin:12px}.statrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}.stat{background:var(--bg);padding:12px;border-radius:13px}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted)}
label{display:block;font-weight:650;margin:12px 0 7px}.field{width:100%;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:13px;padding:13px}.notice{color:var(--muted);font-size:13px;line-height:1.45;margin-top:14px}.search{margin-bottom:10px}.listq{padding:13px;border-bottom:1px solid var(--line)}.listq b{font-size:13px;color:var(--primary)}.listq p{margin:5px 0;font-size:14px}

.block-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.block-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:left;color:var(--text)}.block-card.done{border-color:var(--ok)}.block-title{display:flex;justify-content:space-between;gap:8px;font-weight:800;font-size:17px}.block-status{font-size:12px;color:var(--muted);margin-top:6px}.block-bar{height:7px;background:var(--line);border-radius:99px;overflow:hidden;margin:12px 0 9px}.block-bar i{display:block;height:100%;background:var(--primary)}.block-card.done .block-bar i{background:var(--ok)}.block-action{color:var(--primary);font-weight:750;font-size:13px}.block-card.done .block-action{color:var(--ok)}
@media(max-width:480px){.grid,.block-grid{grid-template-columns:1fr}.menu{min-height:102px}.question{font-size:18px}}
</style></head><body><div class="app">

iXSwiY29ycmVjdCI6MX1d'),c=>c.charCodeAt(0))));</script><script>
const Q=window.QUESTION_BANK||[],subjects=[...new Set(Q.map(x=>x.subject))];const ids=['totalLabel','themeBtn','mistakeCount','favoriteCount','subjectSummary','subjectSelect','setupTitle','countSelect','shuffleOptions','timer','qSubject','qNumber','bar','questionText','options','favBtn','nextBtn','score','correctStat','wrongStat','timeStat','listTitle','searchBox','questionList','blockList','blockHomeText'];const E={};ids.forEach(id=>E[id]=document.getElementById(id));const {totalLabel,themeBtn,mistakeCount,favoriteCount,subjectSummary,subjectSelect,setupTitle,countSelect,shuffleOptions,timer,qSubject,qNumber,bar,questionText,options,favBtn,nextBtn,score,correctStat,wrongStat,timeStat,listTitle,searchBox,questionList,blockList,blockHomeText}=E;let mode='learn',session=[],pos=0,answers=[],displayOptions=[],startedAt=0,timerId=null,currentList=[],currentBlock=null;
const state={mistakes:new Set(JSON.parse(localStorage.getItem('gak_mistakes')||'[]')),favorites:new Set(JSON.parse(localStorage.getItem('gak_favorites')||'[]')),dark:localStorage.getItem('gak_dark')==='1',blocks:JSON.parse(localStorage.getItem('gak_blocks_v2')||'{}')};
if(state.dark)document.body.classList.add('dark');const byId=id=>Q.find(q=>q.id===id);
function save(){localStorage.setItem('gak_mistakes',JSON.stringify([...state.mistakes]));localStorage.setItem('gak_favorites',JSON.stringify([...state.favorites]));localStorage.setItem('gak_blocks_v2',JSON.stringify(state.blocks));updateCounts()}
function show(id){['home','blocks','setup','quiz','result','favorites'].forEach(x=>document.getElementById(x).classList.toggle('hidden',x!==id));if(id==='home')updateCounts()}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function plural(n){return n%10===1&&n%100!==11?'вопрос':(n%10>=2&&n%10<=4&&(n%100<10||n%100>=20)?'вопроса':'вопросов')}
function updateCounts(){mistakeCount.textContent=`${state.mistakes.size} ${plural(state.mistakes.size)}`;favoriteCount.textContent=`${state.favorites.size} ${plural(state.favorites.size)}`;const done=Object.values(state.blocks).filter(x=>x&&x.completed).length;blockHomeText.textContent=`${done} из ${Math.ceil(Q.length/100)} завершено`}
totalLabel.textContent=`${Q.length} вопросов · ${subjects.length} предмета`;subjectSummary.innerHTML=subjects.map(s=>{const n=Q.filter(q=>q.subject===s).length;return `<div class="subject" onclick="openSetup('learn','${s}')"><span>${s}</span><small>${n}</small></div>`}).join('');
subjectSelect.innerHTML=`<option value="all">Все предметы</option>`+subjects.map(s=>`<option>${s}</option>`).join('');
function seededShuffle(a,seed){a=[...a];let x=seed>>>0;const rnd=()=>{x=(x*1664525+1013904223)>>>0;return x/4294967296};for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const MIXED_ORDER=(()=>{const groups={};Q.forEach(q=>(groups[q.subject]||(groups[q.subject]=[])).push(q));const names=Object.keys(groups).sort();names.forEach((name,i)=>groups[name]=seededShuffle(groups[name],0x9e3779b9^(i+1)*2654435761));const out=[];let added=true,round=0;while(added){added=false;const subjectOrder=seededShuffle(names,0x51f15e5d+round++);for(const name of subjectOrder){if(groups[name].length){out.push(groups[name].shift());added=true}}}return out})();
function blockQuestions(i){return MIXED_ORDER.slice(i*100,Math.min((i+1)*100,MIXED_ORDER.length))}
function blockData(i){if(!state.blocks[i])state.blocks[i]={answers:{},completed:false};return state.blocks[i]}
function showBlocks(){renderBlocks();show('blocks')}
function renderBlocks(){const total=Math.ceil(Q.length/100);blockList.innerHTML=Array.from({length:total},(_,i)=>{const qs=blockQuestions(i),d=blockData(i),answered=Object.keys(d.answers||{}).length,correct=Object.values(d.answers||{}).filter(Boolean).length,pct=Math.round(answered/qs.length*100),score=answered?Math.round(correct/answered*100):0,status=d.completed?'Завершён':answered?'В процессе':'Не начат',action=d.completed?'Пройти заново':answered?'Продолжить':'Начать';return `<button class="block-card ${d.completed?'done':''}" onclick="startBlock(${i})"><div class="block-title"><span>Блок ${i+1}</span><span>${qs.length} ${plural(qs.length)}</span></div><div class="block-status">${status} · ${answered}/${qs.length}${answered?` · ${score}% верно`:''}</div><div class="block-bar"><i style="width:${pct}%"></i></div><div class="block-action">${action} →</div></button>`}).join('');save()}
function mixSubjects(arr){
  const groups={};
  shuffle(arr).forEach(q=>(groups[q.subject]||(groups[q.subject]=[])).push(q));
  const out=[];let last=null;
  while(out.length<arr.length){
    const available=Object.keys(groups).filter(s=>groups[s].length&&s!==last);
    const pool=available.length?available:Object.keys(groups).filter(s=>groups[s].length);
    if(!pool.length)break;
    const max=Math.max(...pool.map(s=>groups[s].length));
    const candidates=pool.filter(s=>groups[s].length===max);
    const subject=candidates[Math.floor(Math.random()*candidates.length)];
    out.push(groups[subject].pop());last=subject;
  }
  return out;
}
function startBlock(i){currentBlock=i;mode='block';const qs=blockQuestions(i),d=blockData(i);if(d.completed){if(confirm('Блок уже завершён. Начать его заново?')){d.answers={};d.completed=false;save()}else return}const unanswered=qs.filter(q=>!Object.prototype.hasOwnProperty.call(d.answers,String(q.id)));start(mixSubjects(unanswered.length?unanswered:qs))}
function openSetup(m,s='all'){mode=m;setupTitle.textContent=m==='learn'?'Режим обучения':'Режим экзамена';subjectSelect.value=s;show('setup')}
function beginSession(){let pool=subjectSelect.value==='all'?Q:Q.filter(q=>q.subject===subjectSelect.value);pool=shuffle(pool);const c=countSelect.value;session=c==='all'?pool:pool.slice(0,Math.min(+c,pool.length));start(session)}
function start(arr){if(!arr.length){alert('Здесь пока нет вопросов.');return}session=arr;pos=0;answers=[];startedAt=Date.now();show('quiz');clearInterval(timerId);timerId=setInterval(updateTimer,1000);renderQuestion();updateTimer()}
function updateTimer(){const sec=Math.floor((Date.now()-startedAt)/1000);timer.textContent=`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`}
function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function renderQuestion(){const q=session[pos];qSubject.textContent=q.subject;qNumber.textContent=`${pos+1} / ${session.length}`;bar.style.width=`${pos/session.length*100}%`;questionText.textContent=q.question;nextBtn.classList.add('hidden');favBtn.textContent=state.favorites.has(q.id)?'★':'☆';displayOptions=q.options.map((text,idx)=>({text,idx}));if(shuffleOptions.checked)displayOptions=shuffle(displayOptions);options.innerHTML=displayOptions.map((o,i)=>`<button class="option" onclick="choose(${i})">${String.fromCharCode(65+i)}. ${esc(o.text)}</button>`).join('')}
function choose(i){const q=session[pos],selected=displayOptions[i].idx,correct=selected===q.correct;answers[pos]={id:q.id,correct,selected};if(!correct)state.mistakes.add(q.id);else state.mistakes.delete(q.id);if(mode==='block'&&currentBlock!==null){const d=blockData(currentBlock);d.answers[String(q.id)]=correct;const total=blockQuestions(currentBlock).length;d.completed=Object.keys(d.answers).length>=total}save();const btns=[...options.children];btns.forEach((b,k)=>{b.disabled=true;const original=displayOptions[k].idx;if(original===q.correct)b.classList.add('correct');if(k===i&&!correct)b.classList.add('wrong')});nextBtn.classList.remove('hidden')}
function nextQuestion(){if(!answers[pos])return;if(pos<session.length-1){pos++;renderQuestion()}else finish()}
function finish(){clearInterval(timerId);bar.style.width='100%';const good=answers.filter(a=>a&&a.correct).length,bad=session.length-good,sec=Math.floor((Date.now()-startedAt)/1000);score.textContent=`${Math.round(good/session.length*100)}%`;correctStat.textContent=good;wrongStat.textContent=bad;timeStat.textContent=`${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;if(mode==='block'&&currentBlock!==null){const d=blockData(currentBlock);d.completed=Object.keys(d.answers).length>=blockQuestions(currentBlock).length;save()}show('result')}
function toggleFavorite(){const id=session[pos].id;if(state.favorites.has(id))state.favorites.delete(id);else state.favorites.add(id);save();favBtn.textContent=state.favorites.has(id)?'★':'☆'}
function startMistakes(){mode='learn';start(shuffle([...state.mistakes].map(byId).filter(Boolean)))}
function repeatWrong(){mode='learn';start(answers.filter(a=>a&&!a.correct).map(a=>byId(a.id)).filter(Boolean))}
function showFavorites(){currentList=[...state.favorites].map(byId).filter(Boolean);listTitle.textContent='Избранное';show('favorites');renderList()}
function renderList(){const s=(searchBox.value||'').toLowerCase(),a=currentList.filter(q=>q.question.toLowerCase().includes(s));questionList.innerHTML=a.length?a.map(q=>`<div class="listq"><b>${q.subject}</b><p>${esc(q.question)}</p><button class="secondary" onclick="mode='learn';start([byId(${q.id})])">Открыть</button></div>`).join(''):'<p class="notice">Ничего не найдено.</p>'}
function confirmExit(){if(confirm('Завершить текущую попытку?')){clearInterval(timerId);show('home')}}
themeBtn.onclick=()=>{document.body.classList.toggle('dark');state.dark=document.body.classList.contains('dark');localStorage.setItem('gak_dark',state.dark?'1':'0');themeBtn.textContent=state.dark?'☀️':'🌙'};themeBtn.textContent=state.dark?'☀️':'🌙';updateCounts();
</script></body></html>
